<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Melo Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #05010a;
    --text: #e5e5e5;
    --muted: #9ca3af;
    --accent: #8b5cf6;
    --accent2: #3b82f6;
    --border: rgba(148, 163, 184, 0.35);
    --card: rgba(15, 23, 42, 0.9);
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b0218 0, #05010a 55%);
    color: var(--text);
    padding: 40px 20px;
    text-align: center;
}

/* Title */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 30px;
}

/* Card */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    width: 90%;
    max-width: 600px;
    margin: 0 auto 20px auto;
    text-align: left;
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    letter-spacing: 0.16em;
    color: var(--accent2);
    margin-bottom: 12px;
}

.card-text {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-line;
}

/* Status Badge */
.status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}

.online {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
    border: 1px solid #22c55e;
}

.offline {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
    border: 1px solid #ef4444;
}

/* Footer */
footer {
    margin-top: 40px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
</style>
</head>

<body>

<h1>Melo Status</h1>

<div id="statusBadge" class="status-badge offline">Loading...</div>

<div class="card">
    <div class="card-title">Live Status</div>
    <div id="statusText" class="card-text">Loading Statusdatas...</div>
</div>

<footer>
    © 2026 Melo Bot — Status
</footer>

<script>
const GIST_API_URL = "https://api.github.com/gists/28987430eeaf6024ace7a22b6c3a3aaf";

async function loadStatus() {
    try {
        const res = await fetch(GIST_API_URL);
        const data = await res.json();

        // Get the content of the file
        const fileContent = data.files["melo-status.txt"].content;

        // Display the text
        document.getElementById("statusText").innerText = fileContent;

        // Online/offline badge
        if (fileContent.includes("Online: true")) {
            document.getElementById("statusBadge").innerText = "Online";
            document.getElementById("statusBadge").className = "status-badge online";
        } else {
            document.getElementById("statusBadge").innerText = "Offline";
            document.getElementById("statusBadge").className = "status-badge offline";
        }

    } catch (err) {
        document.getElementById("statusText").innerText = "Failed to load status.";
        document.getElementById("statusBadge").innerText = "Offline";
        document.getElementById("statusBadge").className = "status-badge offline";
    }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>

</body>
</html>
