<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Melo Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<script src="/config.js"></script>
<script>
if (
    MAINTENANCE_MODE &&
    !location.pathname.startsWith("/maintenance") &&
    !location.pathname.startsWith("/maintenance-admin")
) {
    location.href = "/maintenance";
}
</script>
<style>
:root {
    --bg: #05010a;
    --text: #e5e5e5;
    --muted: #9ca3af;
    --accent: #8b5cf6;
    --accent2: #3b82f6;
    --border: rgba(148, 163, 184, 0.35);
    --card: rgba(15, 23, 42, 0.9);
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b0218 0, #05010a 55%);
    color: var(--text);
    padding: 40px 20px;
    text-align: center;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes neonBorder {
    0% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
    50% { box-shadow: 0 0 16px rgba(139, 92, 246, 0.8), 0 0 32px rgba(59, 130, 246, 0.5); }
    100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
}

.wrapper {
    width: 100%;
    max-width: 640px;
    animation: fadeInUp 0.7s ease-out;
}

/* Title */
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 32px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
}

/* Card */
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    width: 100%;
    margin: 0 auto 20px auto;
    text-align: left;
    animation: neonBorder 3.5s ease-in-out infinite;
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px;
    letter-spacing: 0.16em;
    color: var(--accent2);
    margin-bottom: 12px;
    text-transform: uppercase;
}

.card-text {
    font-size: 15px;
    color: var(--muted);
    line-height: 1.6;
    white-space: pre-line;
}

/* Status Badge */
.status-badge {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 14px;
    margin-bottom: 20px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out;
}

.online {
    background: rgba(34, 197, 94, 0.2);
    color: #22c55e;
    border: 1px solid #22c55e;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.5);
}

.offline {
    background: rgba(239, 68, 68, 0.2);
    color: #ef4444;
    border: 1px solid #ef4444;
    box-shadow: 0 0 10px rgba(239, 68, 68, 0.5);
}

/* Footer */
footer {
    margin-top: 10px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrapper">
    <h1>Melo Status</h1>

    <div id="statusBadge" class="status-badge offline">Loading...</div>

    <div class="card">
        <div class="card-title">Live Status</div>
        <div id="statusText" class="card-text">Loading Statusdatas...</div>
    </div>

    <footer>© 2026 Melo Bot — Status</footer>
</div>

<script>
const GIST_API_URL = "https://api.github.com/gists/28987430eeaf6024ace7a22b6c3a3aaf";

async function loadStatus() {
    try {
        const res = await fetch(GIST_API_URL);
        const data = await res.json();

        const fileContent = data.files["melo-status.txt"].content;

        document.getElementById("statusText").innerText = fileContent;

        const badge = document.getElementById("statusBadge");

        if (fileContent.includes("Online: true")) {
            badge.innerText = "Online";
            badge.className = "status-badge online";
        } else {
            badge.innerText = "Offline";
            badge.className = "status-badge offline";
        }

    } catch (err) {
        const badge = document.getElementById("statusBadge");
        document.getElementById("statusText").innerText = "Failed to load status.";
        badge.innerText = "Offline";
        badge.className = "status-badge offline";
    }
}

loadStatus();
setInterval(loadStatus, 15000);
</script>
</body>
</html>
