<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Melo Feedback</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
/* --- SAME CSS AS BEFORE (unchanged) --- */
:root {
    --bg: #05010a;
    --text: #e5e5e5;
    --muted: #9ca3af;
    --accent: #8b5cf6;
    --accent2: #3b82f6;
    --border: rgba(148, 163, 184, 0.45);
    --card: rgba(15, 23, 42, 0.9);
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b0218 0, #05010a 55%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes neonBorder {
    0% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
    50% { box-shadow: 0 0 16px rgba(139, 92, 246, 0.8), 0 0 32px rgba(59, 130, 246, 0.5); }
    100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
}
@keyframes floatCard {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
}
.wrapper {
    width: 100%;
    max-width: 520px;
    animation: fadeInUp 0.7s ease-out;
}
h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 30px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    text-align: center;
    margin-bottom: 24px;
}
.card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 20px;
    animation: neonBorder 3.5s ease-in-out infinite, floatCard 6s ease-in-out infinite;
}
.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 16px;
    letter-spacing: 0.16em;
    color: var(--accent2);
    text-transform: uppercase;
    margin-bottom: 14px;
}
label {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
}
input, textarea {
    width: 100%;
    padding: 10px 12px;
    margin-top: 6px;
    margin-bottom: 16px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.4);
    background: rgba(255, 255, 255, 0.03);
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s ease-out, box-shadow 0.15s ease-out;
}
input:focus, textarea:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 10px rgba(59, 130, 246, 0.4);
}
textarea {
    resize: vertical;
    min-height: 110px;
}
button {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.5);
    background: radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 55%);
    color: var(--text);
    font-size: 14px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out;
}
button:hover {
    transform: translateY(-2px);
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
}
.success {
    display: none;
    margin-top: 16px;
    text-align: center;
    font-size: 14px;
    color: #22c55e;
    letter-spacing: 0.12em;
    text-transform: uppercase;
}
</style>
</head>

<body>
<div class="wrapper">
    <h1>Feedback</h1>

    <div class="card">
        <div class="card-title">Your Message</div>

        <label for="name">Name (optional)</label>
        <input id="name" type="text" placeholder="Your name">

        <label for="message">Feedback</label>
        <textarea id="message" placeholder="Write your feedback here..."></textarea>

        <button onclick="sendFeedback()">Send</button>

        <div id="success" class="success">Feedback sent!</div>
    </div>
</div>

<script src="send.js"></script>
</body>
</html>
