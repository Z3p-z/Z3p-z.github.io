<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>MELO SYSTEM | Official Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #030005;
        --card: rgba(15, 10, 25, 0.7);
        --accent: #8b5cf6;
        --accent-glow: rgba(139, 92, 246, 0.4);
        --blue: #3b82f6;
        --text: #ffffff;
        --muted: #888;
    }

    body {
        background: var(--bg);
        color: var(--text);
        font-family: 'Inter', sans-serif;
        margin: 0;
        overflow-x: hidden;
    }

    /* Animated Glow Background */
    body::before {
        content: "";
        position: fixed;
        top: -10%; left: -10%;
        width: 120%; height: 120%;
        background: radial-gradient(circle at 50% 0%, #1e0a3d 0%, transparent 40%),
                    radial-gradient(circle at 80% 80%, #0a1a3d 0%, transparent 40%);
        z-index: -1;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 40px 20px; }

    header { text-align: center; margin-bottom: 80px; }
    
    .logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 3.5rem;
        font-weight: 900;
        background: linear-gradient(to right, var(--accent), var(--blue));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 10px;
        filter: drop-shadow(0 0 15px var(--accent-glow));
    }

    /* Team Grid */
    .section-title { font-family: 'Orbitron', sans-serif; text-align: center; letter-spacing: 3px; margin-bottom: 40px; }
    
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

    .card {
        background: var(--card);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 20px;
        padding: 30px;
        text-align: center;
        backdrop-filter: blur(15px);
        transition: 0.4s;
    }

    .card:hover {
        border-color: var(--accent);
        transform: translateY(-10px);
        box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px var(--accent-glow);
    }

    .rank-tag {
        display: inline-block;
        padding: 5px 15px;
        border-radius: 50px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 15px;
        background: rgba(255,255,255,0.05);
    }

    .founder { color: var(--accent); border: 1px solid var(--accent); }
    .admin { color: var(--blue); border: 1px solid var(--blue); }
    .mod { color: #10b981; border: 1px solid #10b981; }

    /* Subdomain Links */
    .links-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-bottom: 100px; }
    
    .sub-link {
        padding: 15px 30px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        color: var(--text);
        text-decoration: none;
        font-family: 'Orbitron', sans-serif;
        font-size: 12px;
        transition: 0.3s;
    }

    .sub-link:hover { background: var(--text); color: var(--bg); }

    footer { text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 40px; margin-top: 100px; }
    footer a { color: var(--muted); text-decoration: none; margin: 0 10px; font-size: 12px; }
</style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">MELO</div>
        <p style="color: var(--muted); letter-spacing: 4px;">WHATSAPP BOT SYSTEM</p>
    </header>

    <h2 class="section-title">DIRECTORY</h2>
    <div class="links-container">
        <a href="./dsgvo" class="sub-link">DSGVO / PRIVACY</a>
        <a href="./docs" class="sub-link">DOCUMENTATION</a>
        <a href="./status" class="sub-link">BOT STATUS</a>
    </div>

    <h2 class="section-title">CORE TEAM</h2>
    <div class="grid">
        <div class="card">
            <div class="rank-tag founder">Founder</div>
            <div class="card-name" style="font-family:'Orbitron'; font-size: 24px;">Melo</div>
            <p style="color: var(--muted);">Project Lead & Head of Development.</p>
        </div>
        <div class="card">
            <div class="rank-tag admin">Administrator</div>
            <div class="card-name" style="font-family:'Orbitron'; font-size: 24px;">Moritz</div>
            <p style="color: var(--muted);">System Architecture & Server Management.</p>
        </div>
        <div class="card">
            <div class="rank-tag mod">Moderator</div>
            <div class="card-name" style="font-family:'Orbitron'; font-size: 24px;">Joshua</div>
            <p style="color: var(--muted);">Community Safety & Quality Assurance.</p>
        </div>
    </div>

    <footer>
        <a href="./dsgvo">DSGVO</a> | <a href="https://github.com/z3p-z">GITHUB</a>
        <p style="color: var(--muted); margin-top: 20px;">&copy; 2026 MELO TEAM</p>
    </footer>
</div>

</body>
</html>
