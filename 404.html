<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>404 • Melo Bot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #05010a;
    --text: #e5e5e5;
    --muted: #9ca3af;
    --accent: #8b5cf6;
    --accent2: #3b82f6;
    --border: rgba(148, 163, 184, 0.5);
    --card: rgba(15, 23, 42, 0.9);
}
* { box-sizing: border-box; }
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #0b0218 0, #05010a 55%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
}

/* Animations */
@keyframes fadeInUp {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
}
@keyframes neonBorder {
    0% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
    50% { box-shadow: 0 0 16px rgba(139, 92, 246, 0.8), 0 0 32px rgba(59, 130, 246, 0.5); }
    100% { box-shadow: 0 0 8px rgba(139, 92, 246, 0.4), 0 0 18px rgba(59, 130, 246, 0.2); }
}

.container {
    width: 100%;
    max-width: 520px;
    text-align: center;
    animation: fadeInUp 0.7s ease-out;
}

.card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    padding: 24px 20px;
    animation: neonBorder 3.5s ease-in-out infinite;
}

.code {
    font-family: 'Orbitron', sans-serif;
    font-size: 40px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
}

.message {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: 18px;
}

.link-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 9px 14px;
    border-radius: 10px;
    border: 1px solid rgba(148, 163, 184, 0.5);
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 55%);
    transition: transform 0.15s ease-out, box-shadow 0.15s ease-out, border-color 0.15s ease-out;
}
.link-btn:hover {
    transform: translateY(-2px);
    border-color: var(--accent2);
    box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
}

footer {
    margin-top: 20px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
}
</style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="code">404</div>
        <div class="message">
            This route doesn’t exist in the Melos system.<br>
            Maybe the command was mistyped—or the page moved.
        </div>
        <a class="link-btn" href="/">Back to home</a>
    </div>
    <footer>© 2026 Melo Bot</footer>
</div>
</body>
</html>
