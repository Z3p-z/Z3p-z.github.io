<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Melo Maintenance Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    background: #05010a;
    color: #e5e5e5;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 40px;
}
.card {
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid rgba(148, 163, 184, 0.4);
    padding: 20px;
    border-radius: 12px;
    width: 90%;
    max-width: 420px;
    margin: auto;
}
input, button {
    padding: 10px;
    margin-top: 12px;
    width: 100%;
    border-radius: 8px;
    border: none;
}
button {
    background: #8b5cf6;
    color: white;
    cursor: pointer;
}
button:hover {
    opacity: 0.8;
}
.hidden {
    display: none;
}
</style>
</head>

<body>

<h1>Melo Maintenance Admin</h1>

<div class="card" id="loginBox">
    <h3>Enter Admin Password</h3>
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="error" style="color:#ef4444; display:none;">Wrong password</p>
</div>

<div class="card hidden" id="panel">
    <h3>Maintenance Control</h3>
    <button onclick="enableMaintenance()">Enable Maintenance</button>
    <button onclick="disableMaintenance()">Disable Maintenance</button>
    <p id="status"></p>
</div>

<script src="/config.js"></script>
<script src="admin.js"></script>

</body>
</html>
