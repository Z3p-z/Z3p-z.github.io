<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Owner Panel • Melo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    background: #05010a;
    font-family: 'Inter', sans-serif;
    color: #e5e5e5;
    margin: 0;
}

/* Password screen */
#password-screen {
    position: fixed;
    inset: 0;
    background: #05010a;
    display: flex;
    justify-content: center;
    align-items: center;
}

#password-box {
    background: rgba(15,23,42,0.9);
    padding: 20px;
    border-radius: 16px;
    border: 1px solid rgba(148,163,184,0.5);
    width: 300px;
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid rgba(148,163,184,0.5);
    background: rgba(15,23,42,0.9);
    color: #e5e5e5;
    margin-top: 10px;
}

button {
    margin-top: 12px;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid #3b82f6;
    background: rgba(59,130,246,0.2);
    color: #e5e5e5;
    cursor: pointer;
}

/* Owner panel */
#owner-panel {
    display: none;
    padding: 20px;
}

.card {
    background: rgba(15,23,42,0.9);
    border: 1px solid rgba(148,163,184,0.5);
    border-radius: 16px;
    padding: 18px;
    margin-bottom: 20px;
}

.card-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    letter-spacing: 0.16em;
    color: #3b82f6;
    margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- PASSWORD SCREEN -->
<div id="password-screen">
    <div id="password-box">
        <h2>Owner Access</h2>
        <input id="password-input" type="password" placeholder="Enter password">
        <button onclick="attemptLogin()">Enter</button>
    </div>
</div>

<!-- OWNER PANEL -->
<div id="owner-panel">

    <div class="card">
        <div class="card-title">Direct message user</div>
        <label>User ID</label>
        <input type="text" placeholder="000000000000000000">
        <label style="margin-top:10px;">Message</label>
        <textarea style="width:100%;height:80px;"></textarea>
        <button>Send DM</button>
    </div>

    <div class="card">
        <div class="card-title">Block / unblock user</div>
        <label>User ID</label>
        <input type="text" placeholder="000000000000000000">
        <div style="display:flex; gap:8px; margin-top:10px;">
            <button>Block user</button>
            <button>Unblock user</button>
        </div>
    </div>

</div>
<footer>
    Tought this was real? PAHAHA loser.
</footer>

<script src="auth.js"></script>
</body>
</html>
